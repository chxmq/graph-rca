services:
  chroma:
    image: chromadb/chroma:0.6.3
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/data
    environment:
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - IS_PERSISTENT=TRUE
    networks:
      - rca-network

  mongodb:
    image: mongo:8.0.5
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:-changeme}
    networks:
      - rca-network

  ollama:
    image: ollama/ollama:0.7.0
    ports:
      - "11435:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - rca-network
    # Uncomment below for NVIDIA GPU support (Linux only)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  rca-network:
    driver: bridge
