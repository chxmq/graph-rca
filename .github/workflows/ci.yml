name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend + dev deps from pyproject
        # `.[dev]` pulls pytest, pytest-cov, pytest-asyncio from the
        # [project.optional-dependencies] block so contributors can't
        # silently skip async-marked tests.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run backend tests
        run: pytest backend/tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check and build
        run: npm run build
